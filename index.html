function AMLView({ propId }) {
  const { authApi, user } = useAuth();
  const { prop } = useProperty();
  const [properties, setProperties] = React.useState([]);
  const [selectedProp, setSelectedProp] = React.useState(propId||null);
  const [records, setRecords] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [showForm, setShowForm] = React.useState(false);
  const [form, setForm] = React.useState({ party_type:'vendor', person_name:'', dob:'', nationality:'' });
  const [saving, setSaving] = React.useState(false);

  React.useEffect(() => {
    authApi('GET', '/properties').then(ps => {
      setProperties(ps);
      const pid = propId || (ps[0]&&ps[0].id);
      if(pid) load(pid);
    });
  }, [propId]);

  const load = async (pid) => {
    setSelectedProp(pid); setLoading(true);
    const r = await authApi('GET', `/properties/${pid}/aml`).catch(()=>[]);
    setRecords(r||[]); setLoading(false);
  };

  const create = async (e) => {
    e.preventDefault(); setSaving(true);
    await authApi('POST', `/properties/${selectedProp}/aml`, form).catch(()=>{});
    setShowForm(false); setSaving(false); load(selectedProp);
  };

  const certify = async (id) => {
    await authApi('POST', `/properties/${selectedProp}/aml/${id}/certify`).catch(()=>{});
    load(selectedProp);
  };

  return (
    <div>
      <PageHeader title="AML / KYC" subtitle="Identity verification records"
        actions={['broker','vendor_solicitor','buyer_solicitor'].includes(user?.role) && <button className="btn btn-primary btn-sm" onClick={()=>setShowForm(!showForm)}>+ Add record</button>} />

      {user?.role === 'agent' && (
        <InfoBox type="amber" label="Agent access — status only">
          You can see the vendor AML verification status only. Identity documents are never shared with agents.
        </InfoBox>
      )}

      {showForm && (
        <div className="card" style={{marginBottom:16}}>
          <form onSubmit={create}>
            <div className="grid2">
              <div className="field"><label>Party type</label><select value={form.party_type} onChange={e=>setForm({...form,party_type:e.target.value})}><option value="vendor">Vendor</option><option value="buyer">Buyer</option></select></div>
              <div className="field"><label>Full name *</label><input value={form.person_name} onChange={e=>setForm({...form,person_name:e.target.value})} required /></div>
              <div className="field"><label>Date of birth</label><input type="date" value={form.dob} onChange={e=>setForm({...form,dob:e.target.value})} /></div>
              <div className="field"><label>Nationality</label><input value={form.nationality} onChange={e=>setForm({...form,nationality:e.target.value})} /></div>
            </div>
            <div style={{display:'flex',gap:8}}><button type="submit" className="btn btn-primary btn-sm" disabled={saving}>{saving?'Saving…':'Create'}</button><button type="button" className="btn btn-sm" onClick={()=>setShowForm(false)}>Cancel</button></div>
          </form>
        </div>
      )}

      {loading ? <Spinner /> : records.length === 0 ? (
        <div className="empty"><div className="empty-icon">🛡️</div><div>No AML records yet — add a person above then upload their documents</div></div>
      ) : (
        <div>{records.map(r => (
          <div key={r.id} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
              <div>
                <div style={{fontWeight:500}}>{r.person_name}</div>
                <div style={{fontSize:12,color:'var(--mid)'}}>{r.party_type==='vendor'?'Vendor':'Buyer'} · {r.nationality||'—'}{r.dob?` · DOB: ${r.dob}`:''}</div>
                {r.certified_by_name && <div style={{fontSize:12,color:'var(--green)',marginTop:2}}>✓ Certified by {r.certified_by_name}</div>}
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <Badge status={r.status} />
                {['broker','vendor_solicitor','buyer_solicitor'].includes(user?.role) && r.status!=='certified' && (
                  <button className="btn btn-sm btn-green" onClick={()=>certify(r.id)}>Mark certified</button>
                )}
              </div>
            </div>
            {['broker','vendor_solicitor','buyer_solicitor'].includes(user?.role) && (
              <div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:4}}>
                <div style={{fontSize:11,fontWeight:500,color:'var(--mid)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:8}}>Upload documents</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {['Photo ID (passport)','Photo ID (driving licence)','Proof of address (utility bill)','Proof of address (bank statement)','Electronic verification report','Solicitor certification letter'].map(docType => (
                    <label key={docType} style={{padding:'5px 10px',borderRadius:6,fontSize:12,border:'1px solid var(--border)',background:'var(--light)',cursor:'pointer',color:'var(--mid)'}}>
                      <input type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display:'none'}}
                        onChange={async(e)=>{
                          const file = e.target.files[0]; if(!file) return;
                          const fd = new FormData(); fd.append('file',file); fd.append('doc_type', r.party_type==='buyer'?'aml_buyer':'aml_vendor'); fd.append('description',`${r.person_name} — ${docType}`);
                          const tok = localStorage.getItem('inhous_token');
                          try {
                            const res = await fetch(API+`/properties/${selectedProp}/documents`,{method:'POST',headers:{'Authorization':`Bearer ${tok}`},body:fd});
                            if(!res.ok) throw new Error('Upload failed ('+res.status+')');
                            alert(`${docType} uploaded for ${r.person_name}`);
                            load(selectedProp);
                          } catch(err){ alert('Upload failed: '+err.message); }
                          finally { e.target.value=''; }
                        }} />
                      <i className="ti ti-upload" style={{marginRight:4,fontSize:13}} aria-hidden="true"></i>{docType}
                    </label>
                  ))}
                </div>
              </div>
            )}
          </div>
        ))}</div>
      )}
    </div>
  );
}

function PhotographyView({ propId }) {
  const { authApi, user } = useAuth();
  const { prop } = useProperty();
  const [properties, setProperties] = React.useState([]);
  const [selectedProp, setSelectedProp] = React.useState(propId||null);
  const [bookings, setBookings] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [edits, setEdits] = React.useState({});
  const [saving, setSaving] = React.useState(null);
  const [msg, setMsg] = React.useState(null); // { ok: boolean, text: string }

  React.useEffect(() => {
    authApi('GET', '/properties').then(ps => {
      setProperties(ps);
      const pid = propId || (ps[0]&&ps[0].id);
      if(pid) load(pid);
    });
  }, [propId]);

  const load = async (pid) => {
    setSelectedProp(pid); setLoading(true);
    const b = await authApi('GET', `/properties/${pid}/photography`).catch(()=>[]);
    setBookings(b||[]); setLoading(false);
  };

  const save = async (booking) => {
    setMsg(null);
    const data = edits[booking.id] || {};
    if (!data.preferred_date && !booking.preferred_date) {
      setMsg({ ok:false, text:'Please choose a preferred date before saving.' });
      return;
    }
    setSaving(booking.id);
    try {
      await authApi('PATCH', `/properties/${selectedProp}/photography/${booking.id}`, data);
      await load(selectedProp);
      setMsg({ ok:true, text:'Saved — preferred date confirmed. The shoot is now booked and the listing moves to "photography booked".' });
    } catch (err) {
      setMsg({ ok:false, text: err.message || 'Could not save. Please try again.' });
    } finally {
      setSaving(null);
    }
  };

  const setEdit = (id, key, val) => setEdits(prev => ({...prev, [id]: {...(prev[id]||{}), [key]: val}}));

  const typeLabel = { photography:'Photography', floorplan:'Floorplan', both:'Photography & Floorplan' };

  return (
    <div>
      <PageHeader title="Photography & Floorplan" subtitle="Book and manage property photography" />
      <InfoBox type="gold" label="Important">
        The property listing cannot go live until photography is approved and the floorplan is uploaded. The vendor selects preferred dates — allowing a few days for preparation is recommended.
      </InfoBox>
      {properties.length > 1 && !propId && (
        <div className="field" style={{marginBottom:16}}><label>Property</label>
          <select value={selectedProp||''} onChange={e=>load(Number(e.target.value))}>
            {properties.map(p=><option key={p.id} value={p.id}>{p.address_line1}</option>)}
          </select>
        </div>
      )}
      {loading ? <Spinner /> : (() => {
        const photo = bookings.find(b=>b.booking_type==='photography') || bookings[0];
        if (!photo) return <div className="empty"><div>No booking record found</div></div>;
        return (
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <h3 style={{fontSize:16}}>Photography & Floorplan shoot</h3>
              <Badge status={photo.status} />
            </div>
            <InfoBox type="amber" label="Note">Photos and floorplan are booked as one appointment — pick a single date and time below.</InfoBox>
            <div className="grid2">
              <div className="field"><label>Preferred date</label>
                <input type="date" defaultValue={photo.preferred_date||''} min={new Date().toISOString().split('T')[0]}
                  onChange={e=>setEdit(photo.id,'preferred_date',e.target.value)} />
              </div>
              <div className="field"><label>Preferred time</label>
                <select defaultValue={photo.preferred_time||''} onChange={e=>setEdit(photo.id,'preferred_time',e.target.value)}>
                  <option value="">— Select —</option>
                  {['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00'].map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              {user?.role==='broker' && <>
                <div className="field"><label>Photographer / surveyor firm</label><input defaultValue={photo.photographer_firm||''} onChange={e=>setEdit(photo.id,'photographer_firm',e.target.value)} placeholder="e.g. Lens & Light Photography" /></div>
                <div className="field"><label>Contact email</label><input type="email" defaultValue={photo.photographer_email||''} onChange={e=>setEdit(photo.id,'photographer_email',e.target.value)} /></div>
              </>}
            </div>
            <div className="field"><label>{user?.role==='vendor'?'Preparation notes':'Brief for photographer'}</label>
              <textarea defaultValue={user?.role==='vendor'?photo.vendor_notes||'':photo.broker_brief||''} onChange={e=>setEdit(photo.id,user?.role==='vendor'?'vendor_notes':'broker_brief',e.target.value)} placeholder={user?.role==='vendor'?'Rooms ready, areas to focus on, access instructions…':'Key shots required, rooms to prioritise, floorplan notes…'} style={{minHeight:70}} />
            </div>
            {msg && <div style={{marginBottom:12}}><InfoBox type={msg.ok?'green':'red'} label={msg.ok?'Saved':'Error'}>{msg.text}</InfoBox></div>}
            <button className="btn btn-primary btn-sm" onClick={()=>save(photo)} disabled={saving===photo.id}>{saving===photo.id?'Saving…':'Save & confirm date'}</button>
          </div>
        );
      })()}
    </div>
  );
}

function NotificationsView() {
  const { authApi, user } = useAuth();
  const [notifs, setNotifs] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [scanning, setScanning] = React.useState(false);
  const [scanMsg, setScanMsg] = React.useState(null);

  const load = () => authApi('GET', '/notifications').then(n=>{setNotifs(n||[]); authApi('POST','/notifications/mark-read');}).finally(()=>setLoading(false));
  React.useEffect(() => { load(); }, []);

  const runReminders = async () => {
    setScanning(true); setScanMsg(null);
    try { const r = await authApi('POST','/notifications/run-reminders'); setScanMsg(`${r.created} new action alert(s) created.`); await load(); }
    catch(err){ setScanMsg('Error: '+err.message); } finally { setScanning(false); }
  };

  // Derive a colour level: prefer backend n.level, else map from type
  const typeLevel = { offer_accepted:'green', viewing_confirmed:'green', aml_certified:'green', feedback_received:'green',
                      action_required:'amber', feedback_required:'amber', viewing_request:'amber',
                      offer_declined:'red', viewing_declined:'red' };
  const levelColour = { green:'var(--green)', amber:'var(--amber)', red:'var(--red)', info:'var(--purple)' };
  const levelBadge = { green:'badge-green', amber:'badge-amber', red:'badge-red', info:'badge-purple' };
  const levelOf = (n) => n.level && n.level!=='info' ? n.level : (typeLevel[n.type] || 'info');

  return (
    <div>
      <PageHeader title="Notifications" subtitle={`${notifs.length} notifications`}
        actions={user?.role==='broker' && <button className="btn btn-primary btn-sm" onClick={runReminders} disabled={scanning}>{scanning?'Scanning…':'Check for outstanding actions'}</button>} />
      {scanMsg && <InfoBox type="green">{scanMsg}</InfoBox>}
      <div className="no-print" style={{display:'flex',gap:12,fontSize:11,color:'var(--mid)',marginBottom:12}}>
        <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--green)',marginRight:4}}></span>Done / positive</span>
        <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--amber)',marginRight:4}}></span>Action needed</span>
        <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--red)',marginRight:4}}></span>Urgent / declined</span>
      </div>
      {loading ? <Spinner /> : notifs.length === 0 ? (
        <div className="empty"><div className="empty-icon">🔔</div><div>No notifications</div></div>
      ) : (() => {
        const groups = {};
        notifs.forEach(n => {
          const key = n.property_address ? `${n.property_address}${n.property_city?`, ${n.property_city}`:''}` : 'General';
          (groups[key] = groups[key] || []).push(n);
        });
        return Object.entries(groups).map(([propName, list]) => (
          <div key={propName} style={{marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:600,fontFamily:"'Cormorant Garamond', serif",color:'var(--dark)'}}>{propName==='General'?'General':`🏠 ${propName}`}</span>
              <span className="badge badge-gray">{list.length}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {list.map((n) => {
                const lvl = levelOf(n);
                return (
                  <div key={n.id} className="card" style={{padding:'12px 14px',borderLeft:`4px solid ${levelColour[lvl]}`,opacity:n.is_read?0.75:1}}>
                    <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
                      <span className={`badge ${levelBadge[lvl]}`} style={{marginTop:1,flexShrink:0}}>{lvl==='amber'?'Action':lvl==='red'?'Urgent':lvl==='green'?'Update':(n.type||'').replace(/_/g,' ')}</span>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:500,fontSize:13}}>{n.title}</div>
                        {n.message && <div style={{fontSize:12,color:'var(--mid)',marginTop:2}}>{n.message}</div>}
                        <div style={{fontSize:11,color:'var(--mid)',marginTop:4}}>{n.created_at?.split('T')[0]}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ));
      })()}
    </div>
  );
}

function AdminView() {

                  {properties.map(p=><option key={p.id} value={p.id}>{(p.reference||('#'+p.id))} · {p.city}, {p.country}</option>)}
                </select>
              </div>
              <div className="field"><label>Email *</label><input type="email" value={inviteForm.email} onChange={e=>setInviteForm({...inviteForm,email:e.target.value})} required /></div>
              <div className="field"><label>Role *</label><select value={inviteForm.role} onChange={e=>setInviteForm({...inviteForm,role:e.target.value})}>{roleOpts.filter(r=>r!=='broker').map(r=><option key={r} value={r}>{r.replace(/_/g,' ')}</option>)}</select></div>
              {!['vendor','buyer'].includes(inviteForm.role) && <div className="field"><label>Company / firm</label><input value={inviteForm.agency_name} onChange={e=>setInviteForm({...inviteForm,agency_name:e.target.value})} placeholder="e.g. Knight Frank, Mishcon de Reya" /></div>}

      </div>

  );

              <div className="field"><label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>Personal message (optional) <Dictate onText={t=>setInvForm(f=>({...f,message:(f.message?f.message+' ':'')+t}))} /></label><input value={invForm.message} onChange={e=>setInvForm({...invForm,message:e.target.value})} placeholder="e.g. Please log in to upload AML documents" /></div>

const INTRO_CATS = {
  interior_designer:'Interior designers', builder:'Builders & contractors', architect:'Architects',
  landscaping:'Landscaping & gardens', removal:'Removal companies', cleaning:'Cleaning services',
  insurance:'Insurance', mortgage_advisor:'Mortgage advisors', surveyor:'Surveyors', other:'Other services'
};
const INTRO_ORDER = ['interior_designer','builder','architect','landscaping','removal','cleaning','insurance','mortgage_advisor','surveyor','other'];

function IntroductionsView({ propId }) {
  const { authApi, user } = useAuth();
  const { prop } = useProperty();
  const [partners, setPartners] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [msg, setMsg] = React.useState(null);
  const [requested, setRequested] = React.useState({});
  const [showAdd, setShowAdd] = React.useState(false);
  const blank = { category:'interior_designer', company_name:'', notes:'', contact_email:'', contact_phone:'', website_url:'', disclosure_text:'' };
  const [addForm, setAddForm] = React.useState(blank);
  const eligible = ['under_offer','sold'].includes(prop?.status);

  const load = () => { setLoading(true); authApi('GET','/referral-partners').then(p=>setPartners(p||[])).catch(()=>{}).finally(()=>setLoading(false)); };
  React.useEffect(()=>{ load(); }, [propId]);

  const requestIntro = async (p) => {
    setMsg(null);
    try {
      await authApi('POST', `/properties/${propId}/referrals/acknowledge`, { category:p.category, partner_id:p.id });
      setRequested(r=>({...r,[p.id]:true}));
      setMsg({ ok:true, text:`Introduction requested — ${p.company_name} will be in touch.${p.disclosure_text?' '+p.disclosure_text:''}` });
    } catch(err){ setMsg({ ok:false, text: err.message }); }
  };
  const addPartner = async (e) => {
    e.preventDefault(); setMsg(null);
    try {
      await authApi('POST', '/referral-partners', addForm);
      setShowAdd(false); setAddForm(blank); setMsg({ ok:true, text:'Partner added.' }); load();
    } catch(err){ setMsg({ ok:false, text: err.message }); }
  };

  if (!eligible && user?.role !== 'broker') {
    return <div><PageHeader title="Introductions" subtitle="Trusted third-party partners" />
      <InfoBox type="amber" label="Available after acceptance">Trusted introductions — interior designers, builders, removals and more — become available here once an offer has been accepted.</InfoBox></div>;
  }

  const groups = {};
  partners.forEach(p=>{ (groups[p.category]=groups[p.category]||[]).push(p); });
  const cats = Object.keys(groups).sort((a,b)=>{ const ia=INTRO_ORDER.indexOf(a), ib=INTRO_ORDER.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib); });

  return (
    <div>
      <PageHeader title="Introductions" subtitle="Trusted third-party partners"
        actions={user?.role==='broker' && <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(!showAdd)}>+ Add partner</button>} />
      {['buyer','vendor'].includes(user?.role) && <InfoBox type="purple" label="Now your move is agreed">INHOUS works with a network of trusted partners. Request an introduction below and they'll be in touch. Where a referral fee applies, it's shown on the partner.</InfoBox>}
      {user?.role==='broker' && !eligible && <InfoBox type="amber" label="Note">Buyers and vendors see this once an offer is accepted on this property — you can curate the list now.</InfoBox>}
      {msg && <InfoBox type={msg.ok?'green':'red'}>{msg.text}</InfoBox>}
      {showAdd && (
        <div className="card" style={{marginBottom:16}}>
          <h3 style={{fontSize:15,marginBottom:12}}>Add introduction partner</h3>
          <form onSubmit={addPartner}>
            <div className="grid2">
              <div className="field"><label>Category</label><select value={addForm.category} onChange={e=>setAddForm({...addForm,category:e.target.value})}>{INTRO_ORDER.map(c=><option key={c} value={c}>{INTRO_CATS[c]}</option>)}</select></div>
              <div className="field"><label>Company name *</label><input value={addForm.company_name} onChange={e=>setAddForm({...addForm,company_name:e.target.value})} required /></div>
              <div className="field"><label>Contact email</label><input type="email" value={addForm.contact_email} onChange={e=>setAddForm({...addForm,contact_email:e.target.value})} /></div>
              <div className="field"><label>Contact phone</label><PhoneInput value={addForm.contact_phone} onChange={v=>setAddForm({...addForm,contact_phone:v})} /></div>
            </div>
            <div className="field"><label>Website</label><input value={addForm.website_url} onChange={e=>setAddForm({...addForm,website_url:e.target.value})} placeholder="https://" /></div>
            <div className="field"><label>Short description</label><input value={addForm.notes} onChange={e=>setAddForm({...addForm,notes:e.target.value})} placeholder="e.g. Full-service luxury interior design" /></div>
            <div className="field"><label>Fee disclosure (shown to clients)</label><input value={addForm.disclosure_text} onChange={e=>setAddForm({...addForm,disclosure_text:e.target.value})} placeholder="e.g. INHOUS receives a referral fee…" /></div>
            <div style={{display:'flex',gap:8}}><button type="submit" className="btn btn-primary btn-sm">Add partner</button><button type="button" className="btn btn-sm" onClick={()=>setShowAdd(false)}>Cancel</button></div>
          </form>
        </div>
      )}
      {loading ? <Spinner/> : cats.length===0 ? (
        <div className="empty"><div className="empty-icon">🤝</div><div>No partners listed yet</div></div>
      ) : cats.map(cat=>(
        <div key={cat} style={{marginBottom:18}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--mid)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:8}}>{INTRO_CATS[cat]||cat}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:10}}>
            {groups[cat].map(p=>(
              <div key={p.id} className="card">
                <div style={{fontWeight:500,fontSize:14}}>{p.company_name}</div>
                {p.notes && <div style={{fontSize:12,color:'var(--mid)',marginTop:2}}>{p.notes}</div>}
                {p.website_url && <div style={{marginTop:4}}><a href={p.website_url} target="_blank" rel="noreferrer" style={{fontSize:12,color:'var(--purple)'}}>Visit website</a></div>}
                {user?.role==='broker' && p.referral_fee_amount!=null && <div style={{fontSize:11,color:'var(--mid)',marginTop:4}}>Fee: {p.referral_fee_type==='percentage'?`${p.referral_fee_amount}%`:`£${p.referral_fee_amount}`}</div>}
                {p.disclosure_text && <div style={{fontSize:11,color:'var(--mid)',marginTop:6,fontStyle:'italic'}}>{p.disclosure_text}</div>}
                {['buyer','vendor'].includes(user?.role) && (requested[p.id]
                  ? <div style={{marginTop:8,fontSize:12,color:'var(--green)',fontWeight:500}}>✓ Introduction requested</div>
                  : <button className="btn btn-sm btn-primary" style={{marginTop:8}} onClick={()=>requestIntro(p)}>Request introduction</button>)}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

const ROLE_LABELS = { broker:'INHOUS broker', vendor:'Vendor', agent:'Agent', vendor_solicitor:'Vendor solicitor', buyer_solicitor:'Buyer solicitor', buyer:'Buyer', family_office:'Family office', photographer:'Photographer', surveyor:'Surveyor', mortgage_broker:'Mortgage broker' };
const CURRENCY_SYM = { GBP:'£', EUR:'€', USD:'$', CHF:'CHF ', AED:'AED ' };

function ValuationsView({ propId }) {
  const { authApi, user } = useAuth();
  const { prop } = useProperty();
  const [vals, setVals] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [showForm, setShowForm] = React.useState(false);
  const blank = { valuation_amount:'', suggested_asking_price:'', recommended_fee:'', estimated_timeframe:'', marketing_strategy:'', comments:'' };
  const [form, setForm] = React.useState(blank);
  const [msg, setMsg] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const sym = CURRENCY_SYM[prop?.currency||'GBP'] || '£';
  const money = (n) => n ? `${sym}${Number(n).toLocaleString()}` : '—';

  const load = () => { authApi('GET',`/properties/${propId}/valuations`).then(v=>setVals(v||[])).catch(()=>{}).finally(()=>setLoading(false)); };
  React.useEffect(()=>{ load(); }, [propId]);

  const submit = async (e) => {
    e.preventDefault(); setSaving(true); setMsg(null);
    try {
      await authApi('POST',`/properties/${propId}/valuations`, {...form, valuation_amount:parseInt(form.valuation_amount)||null, suggested_asking_price:parseInt(form.suggested_asking_price)||null});
      setShowForm(false); setForm(blank); setMsg({ok:true,text:'Valuation submitted.'}); load();
    } catch(err){ setMsg({ok:false,text:err.message}); } finally { setSaving(false); }
  };

  const amounts = vals.map(v=>v.valuation_amount).filter(Boolean);
  const avg = amounts.length ? Math.round(amounts.reduce((a,b)=>a+b,0)/amounts.length) : 0;
  const hi = amounts.length ? Math.max(...amounts) : 0;
  const lo = amounts.length ? Math.min(...amounts) : 0;
  const isAgent = user?.role === 'agent';
  const mine = isAgent && vals.length > 0;

  return (
    <div>
      <PageHeader title="Valuations" subtitle="Pre-instruction agent valuations"
        actions={isAgent && !mine && <button className="btn btn-primary btn-sm" onClick={()=>setShowForm(!showForm)}>+ Submit valuation</button>} />
      {msg && <InfoBox type={msg.ok?'green':'red'}>{msg.text}</InfoBox>}
      {isAgent && <InfoBox type="purple" label="Agent">Submit your market appraisal for this property. You can see only your own valuation; the vendor and INHOUS see all submissions side by side.</InfoBox>}

      {showForm && isAgent && (
        <div className="card" style={{marginBottom:16}}>
          <h3 style={{fontSize:15,marginBottom:12}}>Your valuation</h3>
          <form onSubmit={submit}>
            <div className="grid2">
              <div className="field"><label>Valuation ({sym.trim()}) *</label><input type="number" value={form.valuation_amount} onChange={e=>setForm({...form,valuation_amount:e.target.value})} placeholder="e.g. 6500000" required /></div>
              <div className="field"><label>Suggested asking price</label><input type="number" value={form.suggested_asking_price} onChange={e=>setForm({...form,suggested_asking_price:e.target.value})} placeholder="e.g. 6750000" /></div>
              <div className="field"><label>Recommended fee</label><input value={form.recommended_fee} onChange={e=>setForm({...form,recommended_fee:e.target.value})} placeholder="e.g. 1.25% + VAT" /></div>
              <div className="field"><label>Estimated time to sell</label><input value={form.estimated_timeframe} onChange={e=>setForm({...form,estimated_timeframe:e.target.value})} placeholder="e.g. 8-12 weeks" /></div>
            </div>
            <div className="field"><label>Marketing strategy</label><textarea value={form.marketing_strategy} onChange={e=>setForm({...form,marketing_strategy:e.target.value})} placeholder="Channels, target buyers, launch plan…" style={{minHeight:60}} /></div>
            <div className="field"><label>Comments</label><textarea value={form.comments} onChange={e=>setForm({...form,comments:e.target.value})} placeholder="Rationale for your valuation…" style={{minHeight:50}} /></div>
            <div style={{display:'flex',gap:8}}><button type="submit" className="btn btn-primary btn-sm" disabled={saving}>{saving?'Submitting…':'Submit valuation'}</button><button type="button" className="btn btn-sm" onClick={()=>setShowForm(false)}>Cancel</button></div>
          </form>
        </div>
      )}

      {!isAgent && amounts.length>0 && (
        <div className="stat-grid">
          <div className="stat"><div className="stat-val">{vals.length}</div><div className="stat-lbl">Valuations</div></div>
          <div className="stat"><div className="stat-val">{money(avg)}</div><div className="stat-lbl">Average</div></div>
          <div className="stat"><div className="stat-val">{money(hi)}</div><div className="stat-lbl">Highest</div></div>
          <div className="stat"><div className="stat-val">{money(lo)}</div><div className="stat-lbl">Lowest</div></div>
        </div>
      )}

      {loading ? <Spinner/> : vals.length===0 ? (
        <div className="empty"><div className="empty-icon">📊</div><div>{isAgent?'You have not submitted a valuation yet':'No valuations submitted yet'}</div></div>
      ) : (
        <div>{vals.map(v=>(
          <div key={v.id} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:500,fontSize:14}}>{v.agency_name||'—'}{!isAgent&&v.negotiator_name?` · ${v.negotiator_name}`:''}</div>
                <div style={{fontSize:12,color:'var(--mid)',marginTop:2}}>{v.recommended_fee?`Fee: ${v.recommended_fee}`:''}{v.estimated_timeframe?`  ·  ${v.estimated_timeframe}`:''}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:18,fontWeight:600,color:'var(--purple)'}}>{money(v.valuation_amount)}</div>
                {v.suggested_asking_price ? <div style={{fontSize:11,color:'var(--mid)'}}>asking {money(v.suggested_asking_price)}</div> : null}
              </div>
            </div>
            {v.marketing_strategy && <div style={{fontSize:12,marginTop:6}}><b>Strategy:</b> {v.marketing_strategy}</div>}
            {v.comments && <div style={{fontSize:12,color:'var(--mid)',marginTop:4}}>{v.comments}</div>}
          </div>
        ))}</div>
      )}
    </div>
  );
}

function BrochureView({ propId }) {
  const { authApi, user } = useAuth();
  const { prop } = useProperty();
  const [images, setImages] = React.useState([]);
  const [urls, setUrls] = React.useState({});
  const [form, setForm] = React.useState({ headline:'', summary:'', highlights:'', hero_doc_id:null });
  const [loading, setLoading] = React.useState(true);
  const [saving, setSaving] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const sym = CURRENCY_SYM[prop?.currency||'GBP'] || '£';

  React.useEffect(()=>{
    let revoke=[];
    authApi('GET',`/properties/${propId}/brochure`).then(async (d)=>{
      const imgs = d.images||[]; setImages(imgs);
      const b = d.brochure||{};
      setForm({ headline:b.headline||'', summary:b.summary||'', highlights:b.highlights||'', hero_doc_id:b.hero_doc_id||(imgs[0]&&imgs[0].id)||null });
      const tok = localStorage.getItem('inhous_token'); const map={};
      for (const im of imgs) {
        try { const r=await fetch(`${API}/properties/${propId}/documents/${im.id}/download`,{headers:tok?{Authorization:`Bearer ${tok}`}:{}}); if(r.ok){ const u=URL.createObjectURL(await r.blob()); map[im.id]=u; revoke.push(u);} } catch(e){}
      }
      setUrls(map);
    }).catch(()=>{}).finally(()=>setLoading(false));
    return ()=>revoke.forEach(u=>URL.revokeObjectURL(u));
  }, [propId]);

  const save = async () => { setSaving(true); setMsg(null);
    try { await authApi('PUT',`/properties/${propId}/brochure`, form); setMsg({ok:true,text:'Brochure saved.'}); }
    catch(err){ setMsg({ok:false,text:err.message}); } finally { setSaving(false); }
  };

  if (loading) return <div><PageHeader title="Brochure"/><Spinner/></div>;
  const canEdit = ['broker','agent','vendor'].includes(user?.role);
  const photos = images.filter(i=>i.doc_type==='photo');
  const floorplans = images.filter(i=>i.doc_type==='floorplan');
  const hero = form.hero_doc_id || (photos[0]&&photos[0].id) || (images[0]&&images[0].id);
  const money = prop?.guide_price ? `${sym}${Number(prop.guide_price).toLocaleString()}` : '';
  const highlightList = (form.highlights||'').split('\n').map(s=>s.trim()).filter(Boolean);

  return (
    <div>
      <PageHeader title="Brochure" subtitle="Build a brochure from the photos & floorplans"
        actions={canEdit && <span className="no-print"><button className="btn btn-sm" onClick={save} disabled={saving} style={{marginRight:6}}>{saving?'Saving…':'Save'}</button><button className="btn btn-primary btn-sm" onClick={()=>window.print()}>Print / PDF</button></span>} />
      {images.length===0 && <div className="no-print"><InfoBox type="amber" label="No images yet">Upload photos and floorplans (via Photography or Documents) and they'll appear here to build the brochure.</InfoBox></div>}
      {msg && <div className="no-print"><InfoBox type={msg.ok?'green':'red'}>{msg.text}</InfoBox></div>}

      {canEdit && (
        <div className="card no-print" style={{marginBottom:16}}>
          <div className="field"><label>Headline</label><input value={form.headline} onChange={e=>setForm({...form,headline:e.target.value})} placeholder="e.g. An exceptional Regency villa overlooking the park" /></div>
          <div className="field"><label>Summary</label><textarea value={form.summary} onChange={e=>setForm({...form,summary:e.target.value})} placeholder="Lead paragraph describing the property…" style={{minHeight:80}} /></div>
          <div className="field"><label>Key highlights (one per line)</label><textarea value={form.highlights} onChange={e=>setForm({...form,highlights:e.target.value})} placeholder={"6 bedrooms\nSouth-facing garden\nOff-street parking"} style={{minHeight:80}} /></div>
          {photos.length>0 && (
            <div className="field"><label>Cover photo</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {photos.map(p=>(
                  <div key={p.id} onClick={()=>setForm({...form,hero_doc_id:p.id})} style={{cursor:'pointer',border:`2px solid ${hero===p.id?'var(--purple)':'transparent'}`,borderRadius:6,padding:2}}>
                    {urls[p.id] ? <img src={urls[p.id]} alt="" style={{width:90,height:60,objectFit:'cover',borderRadius:4,display:'block'}}/> : <div style={{width:90,height:60,background:'var(--light)',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--mid)'}}>img</div>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      <div className="brochure-preview card" style={{padding:0,overflow:'hidden'}}>
        {hero && urls[hero] ? <img src={urls[hero]} alt="" style={{width:'100%',maxHeight:380,objectFit:'cover',display:'block'}}/> : <div style={{height:180,background:'var(--light)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--mid)'}}>No cover photo yet</div>}
        <div style={{padding:24}}>
          <div style={{fontSize:11,letterSpacing:'0.12em',color:'var(--gold)',textTransform:'uppercase'}}>INHOUS</div>
          <h2 style={{fontSize:26,margin:'4px 0'}}>{form.headline || prop?.address_line1}</h2>
          <div style={{fontSize:13,color:'var(--mid)'}}>{prop?.address_line1}{prop?.address_line2?`, ${prop.address_line2}`:''}, {prop?.city}{prop?.postcode?` ${prop.postcode}`:''}</div>
          {money && <div style={{fontSize:22,fontWeight:600,color:'var(--purple)',marginTop:8}}>{money}</div>}
          <div style={{display:'flex',gap:8,flexWrap:'wrap',margin:'12px 0'}}>
            {prop?.bedrooms && <span className="badge badge-gray">{prop.bedrooms} bed</span>}
            {prop?.floor_area_sqft && <span className="badge badge-gray">{prop.floor_area_sqft.toLocaleString()} sq ft</span>}
            {prop?.tenure && <span className="badge badge-gray">{prop.tenure}</span>}
            {prop?.epc_rating && <span className="badge badge-gray">EPC {prop.epc_rating}</span>}
          </div>
          {form.summary && <p style={{fontSize:14,lineHeight:1.6}}>{form.summary}</p>}
          {highlightList.length>0 && <ul style={{margin:'12px 0',paddingLeft:18,fontSize:14}}>{highlightList.map((h,i)=><li key={i} style={{marginBottom:4}}>{h}</li>)}</ul>}
          {photos.length>1 && <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:8,marginTop:12}}>
            {photos.filter(p=>p.id!==hero).map(p=> urls[p.id] ? <img key={p.id} src={urls[p.id]} alt="" style={{width:'100%',height:110,objectFit:'cover',borderRadius:6}}/> : null)}
          </div>}
          {floorplans.length>0 && <div style={{marginTop:16}}><div style={{fontSize:12,fontWeight:600,color:'var(--mid)',textTransform:'uppercase',marginBottom:6}}>Floorplan</div>
            {floorplans.map(f=> urls[f.id] ? <img key={f.id} src={urls[f.id]} alt="" style={{width:'100%',borderRadius:6,marginBottom:8}}/> : null)}</div>}
        </div>
      </div>
    </div>
  );
}

function PropertyShell({ prop, page, setPage, onBack, children }) {
  const { user } = useAuth();
  const sym = {GBP:'£',EUR:'€',USD:'$',CHF:'CHF ',AED:'AED '}[prop.currency||'GBP'] || '£';
  const tabs = [
    { id:'property', label:'Overview', roles:['broker','vendor','agent','vendor_solicitor','buyer_solicitor','buyer','family_office'] },
    { id:'participants', label:'Participants', roles:['broker','vendor','agent','vendor_solicitor','buyer_solicitor','buyer','family_office','photographer','surveyor','mortgage_broker'] },
    { id:'valuations', label:'Valuations', roles:['broker','vendor','agent'] },
    { id:'viewings', label:'Viewings', roles:['broker','vendor','agent'] },
    { id:'feedback', label:'Feedback', roles:['broker','vendor','agent'] },
    { id:'offers', label:'Offers', roles:['broker','vendor','agent'] },
    { id:'documents', label:'Documents', roles:['broker','vendor','vendor_solicitor','buyer_solicitor','buyer','family_office','photographer','surveyor','mortgage_broker'] },
    { id:'aml', label:'AML / KYC', roles:['broker','vendor_solicitor','buyer_solicitor','agent'] },
    { id:'photography', label:'Photography', roles:['broker','vendor','photographer'] },
    { id:'brochure', label:'Brochure', roles:['broker','vendor','agent'] },
    { id:'introductions', label:'Introductions', roles:['broker','vendor','buyer'] },
  ].filter(t => t.roles.includes(user?.role));
  // Introductions only surface for buyer/vendor once an offer is accepted; broker can curate anytime
  const introEligible = ['under_offer','sold'].includes(prop.status);
  const visibleTabs = (!introEligible && user?.role !== 'broker') ? tabs.filter(t => t.id !== 'introductions') : tabs;
  return (
    <div>
      <button className="btn btn-sm" onClick={onBack} style={{marginBottom:10}}>← All properties</button>
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
          <div>
            <div style={{fontSize:19,fontWeight:500,fontFamily:"'Cormorant Garamond', serif"}}>{prop.address_line1}{prop.address_line2?`, ${prop.address_line2}`:''}</div>
            <div style={{fontSize:12,color:'var(--mid)',marginTop:2}}>{prop.city}{prop.state_region?`, ${prop.state_region}`:''} · {prop.country}{prop.postcode?` · ${prop.postcode}`:''}</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            {prop.guide_price ? <div style={{fontSize:16,fontWeight:600,color:'var(--purple)'}}>{sym}{prop.guide_price.toLocaleString()}</div> : null}
            <Badge status={prop.status} />
          </div>
        </div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:14,borderTop:'1px solid var(--border)',paddingTop:12}}>
          {visibleTabs.map(t => (
            <button key={t.id} onClick={()=>setPage(t.id)}
              style={{padding:'6px 13px',borderRadius:'var(--radius-sm)',border:'none',cursor:'pointer',fontSize:13,transition:'all .15s',
                background: page===t.id?'var(--purple)':'var(--light)', color: page===t.id?'#fff':'var(--mid)', fontWeight: page===t.id?500:400}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>
      {children}
    </div>
  );
}

function App() {
  const { user, loading } = useAuth();
  const [page, setPage] = React.useState('dashboard');
  const [activeProperty, setActiveProperty] = React.useState(null);

  const openProperty = (prop) => { setActiveProperty(prop); setPage('property'); };
  const closeProperty = () => { setActiveProperty(null); setPage('properties'); };

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--cream)'}}><div style={{textAlign:'center'}}><div style={{fontSize:28,fontFamily:"'Cormorant Garamond', serif",color:'var(--gold)',marginBottom:8}}>INHOUS</div><div style={{color:'var(--mid)',fontSize:13}}>Loading…</div></div></div>;
  if (!user) return <LoginView />;

  const views = {
    dashboard:<DashboardView openProperty={openProperty}/>,
    properties:<PropertiesView openProperty={openProperty}/>,
    property: activeProperty ? <PropertyView onBack={closeProperty} setPage={setPage}/> : <PropertiesView openProperty={openProperty}/>,
    viewings:<ViewingsView propId={activeProperty?.id}/>,
    feedback:<FeedbackView propId={activeProperty?.id}/>,
    offers:<OffersView propId={activeProperty?.id}/>,
    documents:<DocumentsView propId={activeProperty?.id}/>,
    aml:<AMLView propId={activeProperty?.id}/>,
    photography:<PhotographyView propId={activeProperty?.id}/>,
    brochure:<BrochureView propId={activeProperty?.id}/>,
    participants:<ParticipantsView propId={activeProperty?.id}/>,
    valuations:<ValuationsView propId={activeProperty?.id}/>,
    introductions:<IntroductionsView propId={activeProperty?.id}/>,
    notifications:<NotificationsView/>,
    admin:<AdminView/>
  };

  const content = views[page] || <DashboardView openProperty={openProperty}/>;
  const inFolder = activeProperty && ['participants','valuations','viewings','feedback','offers','documents','aml','photography','brochure','introductions'].includes(page);

  return (
    <PropertyContext.Provider value={{ prop: activeProperty, openProperty }}>
      <DashboardLayout currentPage={page} setPage={setPage} activeProperty={activeProperty} closeProperty={closeProperty}>
        {inFolder
          ? <PropertyShell prop={activeProperty} page={page} setPage={setPage} onBack={closeProperty}>{content}</PropertyShell>
          : content}
      </DashboardLayout>
    </PropertyContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AuthProvider><App /></AuthProvider>);
</script>
</body>
</html>
